    <script>
      (function () {
        var h = location.hash;
        if (h && h.indexOf("#/") === 0) {
          history.replaceState(null, "", location.pathname + location.search + h.slice(1));
        } else if (h && h !== "#") {
          history.replaceState(null, "", location.pathname + location.search);
        }
      })();
    </script>
    <style>
      body {
        margin: 0;
        background: #000000;
        color: #7d88a8;
        font-family: "Segoe UI", sans-serif;
      }
      .boot {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        min-height: 100vh;
      }
      .boot-icon {
        font-size: 48px;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.06); opacity: 0.85; }
      }
      .boot-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid rgba(139, 149, 168, 0.2);
        border-top-color: #00dfff;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
