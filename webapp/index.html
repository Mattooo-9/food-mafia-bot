<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Mafia TMA</title>
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Food Mafia 🍔</div>
        <div id="ton-connect"></div>
    </header>

    <main>
        <section id="catalog">
            <h2>Chef's Menu</h2>
            <div class="menu-grid">
                <div class="menu-item" data-id="1" data-price="0.5">
                    <img src="https://via.placeholder.com/150" alt="Burger">
                    <h3>Mafia Burger</h3>
                    <p>0.5 TON</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
                <div class="menu-item" data-id="2" data-price="0.3">
                    <img src="https://via.placeholder.com/150" alt="Pizza">
                    <h3>Napoli Pizza</h3>
                    <p>0.3 TON</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
                <div class="menu-item" data-id="3" data-price="0.2">
                    <img src="https://via.placeholder.com/150" alt="Sushi">
                    <h3>Samurai Roll</h3>
                    <p>0.2 TON</p>
                    <button class="add-to-cart">Add to Cart</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div id="cart-summary">
            Total: <span id="total-price">0</span> TON
        </div>
        <button id="checkout-btn" disabled>Place Order (Escrow)</button>
    </footer>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
