<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Mafia Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--tg-theme-bg-color, #ffffff);
        color: var(--tg-theme-text-color, #222222);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .card {
        background: var(--tg-theme-secondary-bg-color, #f0f0f0);
        padding: 15px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
      button {
        background-color: var(--tg-theme-button-color, #3390ec);
        color: var(--tg-theme-button-text-color, #ffffff);
        border: none;
        padding: 12px 20px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <h1>Food Mafia 🍔</h1>
      <div class="card">
        <h3>Hyper-Local Marketplace</h3>
        <p id="geo-info">Detecting location...</p>
      </div>
      <button id="main-btn">Place Anonymous Order</button>
    </div>
    <script>
      const tg = window.Telegram.WebApp;
      tg.expand();

      const btn = document.getElementById('main-btn');
      btn.addEventListener('click', () => {
        tg.sendData(JSON.stringify({action: 'order_requested', timestamp: Date.now()}));
        tg.close();
      });

      // Mock geo detection
      setTimeout(() => {
        document.getElementById('geo-info').innerText = 'Location: H3 Cell 8928308280fffff (Nearby: 12 Chefs)';
      }, 1500);
    </script>
  </body>
</html>
