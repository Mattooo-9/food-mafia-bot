app = 'food-mafia-bot'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  USE_WEBHOOK = '1'
  LOG_LEVEL = 'INFO'
  KEEP_ALIVE_INTERVAL_MINUTES = '10'
  HOST = '0.0.0.0'
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
