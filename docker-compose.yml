services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      ADMIN_ID: ${ADMIN_ID:-0}
      WEBAPP_URL: ${WEBAPP_URL:-}
      DATABASE_URL: postgresql+asyncpg://food:food@db:5432/food_mafia
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: food
      POSTGRES_PASSWORD: food
      POSTGRES_DB: food_mafia
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U food -d food_mafia"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  uploads:
  pgdata:
