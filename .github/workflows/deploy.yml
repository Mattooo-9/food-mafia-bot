name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/mattooo-9/food-mafia-bot:latest
  PUBLIC_URL: https://food-mafia-bot.onrender.com

jobs:
  build-push:
    name: Build Docker → GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR image public (Render pulls without credentials)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api --method PATCH "/user/packages/container/food-mafia-bot/visibility" \
            -f visibility=public || true

  deploy-render:
    name: Deploy Render (pre-built image)
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Point Render at GHCR image + deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          DOCKER_IMAGE: ${{ env.IMAGE }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: python scripts/deploy_render_image.py

  deploy-hf:
    name: Deploy Hugging Face (backup)
    needs: build-push
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: HF Space deploy
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_ID: ${{ secrets.ADMIN_ID }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          if [ -z "$HF_TOKEN" ]; then echo "HF_TOKEN not set — skip"; exit 0; fi
          pip install -q huggingface_hub
          python scripts/deploy_huggingface.py

  sync-telegram:
    name: Sync bot (menu + webhook)
    needs: deploy-render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wait for health + configure Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          BACKEND_URLS: ${{ vars.BACKEND_URLS }}
          HEALTH_ATTEMPTS: "18"
          HEALTH_INTERVAL_SECONDS: "20"
        run: |
          URLS="${BACKEND_URLS:-${{ env.PUBLIC_URL }},https://mattooo-9-food-mafia-bot.hf.space}"
          export BACKEND_URLS="$URLS"
          SERVICE_URL=$(python scripts/health_urls.py || echo "${{ env.PUBLIC_URL }}")
          export MINI_APP_URL="$SERVICE_URL"
          export WEBHOOK_URL="$SERVICE_URL"
          export SERVICE_URL
          export USE_WEBHOOK=1
          echo "Using $SERVICE_URL"
          python scripts/sync_telegram.py

  keepalive:
    name: Ping endpoints
    needs: sync-telegram
    runs-on: ubuntu-latest
    if: always()
    steps:
      - run: |
          for u in "${{ env.PUBLIC_URL }}" "https://mattooo-9-food-mafia-bot.hf.space"; do
            curl -fsS --max-time 30 "$u/health" && echo " OK $u" || echo " fail $u"
          done
