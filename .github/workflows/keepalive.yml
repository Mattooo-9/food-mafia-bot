name: keep-alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        env:
          RENDER_URL: ${{ vars.RENDER_URL }}
        run: |
          URL="${RENDER_URL:-https://food-mafia-bot.onrender.com}"
          echo "Pinging $URL/health"
          curl -s -o /dev/null -w "status %{http_code}\n" --max-time 120 "$URL/health" || true
