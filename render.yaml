services:
  - type: web
    name: food-mafia-bot
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: USE_WEBHOOK
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: KEEP_ALIVE_INTERVAL_MINUTES
        value: "10"
      - key: DATABASE_URL
        fromDatabase:
          name: food-mafia-db
          property: connectionString

databases:
  - name: food-mafia-db
    plan: free
