services:
  - type: web
    name: food-mafia-bot
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: USE_WEBHOOK
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: food-mafia-db
          property: connectionString

databases:
  - name: food-mafia-db
    plan: free
